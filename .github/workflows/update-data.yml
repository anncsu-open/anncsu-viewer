name: Update ANNCSU Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run update script
        run: uv run scripts/update_data.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload large files to release
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="data-${DATE}"

          # Delete existing release with same tag if present
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create new release with PMTiles and parquet as assets
          gh release create "$TAG" \
            --title "ANNCSU Data ${DATE}" \
            --notes "Automated data update from ANNCSU open data portal." \
            --latest \
            data/anncsu-indirizzi.pmtiles \
            data/anncsu-indirizzi.parquet

      - name: Commit H3 tiles and metadata
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          git add data/tiles/ data/comuni.json data/comuni-h3.json
          git commit -m "data: update ANNCSU H3 tiles and metadata ($DATE)"
          git push
